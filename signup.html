<!DOCTYPE html>

    <title>Signup</title>
</head>
<body>

<h2>Sign Up</h2>

<form action="signup.php" method="POST">
    <label for="uname">USERNAME :</label><br>
    <input type="text" id="uname" name="username" placeholder="Enter username" required><br><br>

    <button type="submit">Sign Up</button>
</form>
